version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "frontend/"
    schedule:
      interval: "weekly"
    groups:
      node-requirements:
        patterns:
          - "*"

  # Maintain dependencies for uv
  - package-ecosystem: "uv"
    directory: "/src"
    schedule:
      interval: "weekly"
    groups:
      python-requirements:
        patterns:
          - "*"
