name: Python Unit tests

on:
  push:
    branches: [ main ]
    paths:
      - "**.py"
      - "frontend/**"
      - "src/requirements.txt"
      - "src/pyproject.toml"

  pull_request:
    branches: [ main ]
    paths:
      - "**.py"
      - "frontend/**"
      - "src/requirements.txt"
      - "src/pyproject.toml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_package:

    name: Test ${{ matrix.os }} Python ${{ matrix.python_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python_version: ["3.10", "3.11", "3.12"]
    steps:
        - uses: actions/checkout@v6
        - name: Setup python
          uses: actions/setup-python@v6
          with:
            python-version: ${{ matrix.python_version }}
            architecture: x64
        - name: Setup node
          uses: actions/setup-node@v6
          with:
            node-version: 22
        - name: Build frontend
          run: |
            cd ./frontend
            npm install
            npm run build
        - name: Install dependencies
          run: |
            python3 -m pip install --upgrade pip
            python3 -m pip install -e 'src[dev]'
        - name: Run tests
          run: uv run --project src pytest --cov
        - name: Run E2E tests with Playwright
          id: e2e
          run: |
            uv run --active --project src playwright install chromium --with-deps
            uv run --project src pytest tests/e2e.py --tracing=retain-on-failure
        - name: Upload test artifacts
          if: ${{ failure() && steps.e2e.conclusion == 'failure' }}
          uses: actions/upload-artifact@v4
          with:
            name: playwright-traces-${{ matrix.python_version }}
            path: test-results
